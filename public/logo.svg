<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="brain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <g transform="translate(64,58)">
    <!-- Brain left -->
    <path d="M-8,-20 C-24,-20 -30,-8 -30,2 C-30,14 -20,20 -12,20 C-8,20 -6,18 -4,16" fill="none" stroke="url(#brain)" stroke-width="4" stroke-linecap="round"/>
    <!-- Brain right -->
    <path d="M8,-20 C24,-20 30,-8 30,2 C30,14 20,20 12,20 C8,20 6,18 4,16" fill="none" stroke="url(#brain)" stroke-width="4" stroke-linecap="round"/>
    <!-- Brain center -->
    <path d="M0,-18 C0,-18 0,16 0,16" fill="none" stroke="url(#brain)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <!-- Neural connections -->
    <circle cx="-16" cy="-8" r="3" fill="#a5b4fc"/>
    <circle cx="16" cy="-8" r="3" fill="#a5b4fc"/>
    <circle cx="-10" cy="6" r="3" fill="#a5b4fc"/>
    <circle cx="10" cy="6" r="3" fill="#a5b4fc"/>
    <circle cx="0" cy="-2" r="3" fill="#c7d2fe"/>
    <!-- Connection lines -->
    <line x1="-16" y1="-8" x2="0" y2="-2" stroke="#a5b4fc" stroke-width="1.5" opacity="0.5"/>
    <line x1="16" y1="-8" x2="0" y2="-2" stroke="#a5b4fc" stroke-width="1.5" opacity="0.5"/>
    <line x1="-10" y1="6" x2="0" y2="-2" stroke="#a5b4fc" stroke-width="1.5" opacity="0.5"/>
    <line x1="10" y1="6" x2="0" y2="-2" stroke="#a5b4fc" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="64" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="white" letter-spacing="1">IngenIA</text>
</svg>
